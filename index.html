<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>參考圖工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="drag-bar">
    <span id="mode-text">拖曳這裡移動視窗 (Cmd/Ctrl+Shift+X 切換穿透)</span>
    
    <div class="slider-container">
      透明度: <input type="range" id="opacity-slider" min="0.1" max="1" step="0.1" value="0.6">
    </div>

    <div class="window-controls">
      <button id="minimize-btn" title="最小化">_</button>
      <button id="close-btn" title="關閉">✕</button>
    </div>
  </div>

  <div class="image-container" id="drop-zone">
    <input type="file" id="file-input" accept="image/*" style="display: none;">
    
    <p id="drop-text">將圖片拖曳至此<br>或點擊此處選擇圖片</p>
    <img id="ref-image" src="" alt="">
  </div>

  <script src="renderer.js"></script>
</body>
</html>
